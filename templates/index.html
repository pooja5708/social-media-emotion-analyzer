<!DOCTYPE html>
<html>
<head>
    <title>Emotion Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Emotion Detection</h1>

    <form method="POST">
        <textarea name="text" placeholder="Enter your text here..." required></textarea>
        <button type="submit">Analyze Emotion</button>
    </form>

    {% if prediction %}
        <div class="result">
            <h2>Result: {{ prediction }} {{ emoji }}</h2>
        </div>
    {% endif %}
</div>

</body>
</html>
